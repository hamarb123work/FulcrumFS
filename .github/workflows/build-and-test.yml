name: build and test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, main3 ]

jobs:
  build-and-test-core:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        configuration: [Debug, Release]

    runs-on: ${{ matrix.os }}
    environment: ${{ matrix.os == 'windows-latest' && 'test-core-windows-x64' || 'test-core-linux-x64' }}-${{ matrix.configuration == 'Debug' && 'debug' || 'release' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x
    - name: Clean
      run: dotnet clean FulcrumFS.slnx --configuration ${{ matrix.configuration }} && dotnet nuget locals all --clear
    - name: Install dependencies
      run: dotnet restore FulcrumFS.slnx
    - name: Build
      run: dotnet build FulcrumFS.slnx --configuration ${{ matrix.configuration }} --no-restore
    - name: Test
      run: dotnet test FulcrumFS.NoVideos.slnf --configuration ${{ matrix.configuration }} --no-build --verbosity normal

  build-and-test-video-linux:
    runs-on: ubuntu-latest
    environment: test-video-linux-x64

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x
    - name: Build ffmpeg binaries
      env:
        FFMPEG_OUTPUT_DIR: ${{ github.workspace }}/Binaries
      run: |
        mkdir -p "$FFMPEG_OUTPUT_DIR"
        bash .github/scripts/build-ffmpeg/linux/bootstrap-linux.sh
        chmod +x "$FFMPEG_OUTPUT_DIR"/*
    - name: Clean
      run: dotnet clean FulcrumFS.slnx && dotnet nuget locals all --clear
    - name: Install dependencies
      run: dotnet restore FulcrumFS.slnx
    - name: Build (Debug)
      run: dotnet build FulcrumFS.slnx --configuration Debug --no-restore
    - name: Build (Release)
      run: dotnet build FulcrumFS.slnx --configuration Release --no-restore
    - name: Test (Debug)
      run: dotnet test Tests/FulcrumFS.Videos.Tests/FulcrumFS.Videos.Tests.csproj --configuration Debug --no-build --verbosity normal
      env:
        FFMPEG_BINARIES_PATH: ${{ github.workspace }}/Binaries
    - name: Test (Release)
      if: ${{ !cancelled() }}
      run: dotnet test Tests/FulcrumFS.Videos.Tests/FulcrumFS.Videos.Tests.csproj --configuration Release --no-build --verbosity normal
      env:
        FFMPEG_BINARIES_PATH: ${{ github.workspace }}/Binaries

  build-and-test-video-windows:
    runs-on: windows-latest
    environment: test-video-windows-x64

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x
    - name: Build ffmpeg binaries
      env:
        FFMPEG_OUTPUT_DIR: ${{ github.workspace }}/Binaries
      run: |
        New-Item -ItemType Directory -Force -Path $env:FFMPEG_OUTPUT_DIR | Out-Null
        .\.github\scripts\build-ffmpeg\windows\bootstrap-windows.ps1
    - name: Clean
      run: dotnet clean FulcrumFS.slnx && dotnet nuget locals all --clear
    - name: Install dependencies
      run: dotnet restore FulcrumFS.slnx
    - name: Build (Debug)
      run: dotnet build FulcrumFS.slnx --configuration Debug --no-restore
    - name: Build (Release)
      run: dotnet build FulcrumFS.slnx --configuration Release --no-restore
    - name: Test (Debug)
      run: dotnet test Tests/FulcrumFS.Videos.Tests/FulcrumFS.Videos.Tests.csproj --configuration Debug --no-build --verbosity normal
      env:
        FFMPEG_BINARIES_PATH: ${{ github.workspace }}/Binaries
    - name: Test (Release)
      if: ${{ !cancelled() }}
      run: dotnet test Tests/FulcrumFS.Videos.Tests/FulcrumFS.Videos.Tests.csproj --configuration Release --no-build --verbosity normal
      env:
        FFMPEG_BINARIES_PATH: ${{ github.workspace }}/Binaries
